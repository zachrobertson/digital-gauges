<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Digital Gauges (DG)">
  <title>Digital Gauges</title>
  <!-- Dark app-surface background -->
  <rect width="512" height="512" rx="96" fill="#0e1116"/>
  <rect x="6" y="6" width="500" height="500" rx="90" fill="none" stroke="#1d222b" stroke-width="12"/>

  <!-- Gauge track: 180 deg, start and stop level with the centerpoint -->
  <path d="M 106 256 A 150 150 0 0 1 406 256"
        fill="none" stroke="#232a34" stroke-width="40" stroke-linecap="round"/>

  <!-- Active arc: accent fill from the left endpoint toward ~2 o'clock -->
  <path d="M 106 256 A 150 150 0 0 1 385.92 181.04"
        fill="none" stroke="#3ddc97" stroke-width="40" stroke-linecap="round"/>

  <!-- Bottom gauge track: 180 deg, flipped (right to left through the bottom),
       sized to sit between the center hub and the inside of the top arc -->
  <path d="M 336 256 A 80 80 0 0 1 176 256"
        fill="none" stroke="#232a34" stroke-width="34" stroke-linecap="round"/>

  <!-- Active arc (bottom): same fill amount, starting from the right endpoint -->
  <path d="M 336 256 A 80 80 0 0 1 186.72 296"
        fill="none" stroke="#3ddc97" stroke-width="34" stroke-linecap="round"/>

  <!-- Solid center hub -->
  <circle cx="256" cy="256" r="27" fill="#3ddc97"/>
</svg>
